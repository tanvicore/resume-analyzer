<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Analyzer Dashboard</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        display: flex;
        background: #f4f6f8;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background: #1f2937;
        color: white;
        height: 100vh;
        padding: 20px;
    }

    .sidebar h2 {
        margin-bottom: 30px;
    }

    .sidebar p {
        margin: 15px 0;
        cursor: pointer;
        color: #9ca3af;
    }

    .sidebar p:hover,
    .sidebar .active {
        color: white;
        font-weight: bold;
    }

    /* Main */
    .main {
        flex: 1;
        padding: 30px;
    }

    /* Cards */
    .card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
    }

    /* Inputs */
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
    }

    /* Buttons */
    button {
        margin-top: 10px;
        padding: 8px 14px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    /* Tags */
    .tag {
        background: #e5e7eb;
        padding: 4px 8px;
        margin: 2px;
        border-radius: 5px;
        font-size: 12px;
        display: inline-block;
    }

    /* Progress */
    .progress {
        height: 8px;
        background: #e5e7eb;
        border-radius: 10px;
    }

    .progress-bar {
        height: 100%;
        border-radius: 10px;
    }

    /* Hidden sections */
    .section {
        display: none;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚀 Analyzer</h2>
  <p class="active" onclick="showSection('dashboard', this)">Dashboard</p>
  <p onclick="showSection('resumes', this)">Resumes</p>
  <p onclick="showSection('analytics', this)">Analytics</p>
</div>

<!-- Main -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="section" style="display:block;">
    <div class="card">
      <h3>Upload Resume</h3>
      <input type="file" id="file">
      <button onclick="upload()">Upload</button>
    </div>

    <div class="card">
      <h3>Job Description</h3>
      <textarea id="jobDesc" rows="3"></textarea>
    </div>
  </div>

  <!-- RESUMES -->
  <div id="resumes" class="section">
    <div id="output"></div>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="section">
    <div class="card">
      <h3>Analytics</h3>
      <p id="total"></p>
      <p id="avg"></p>
    </div>
  </div>

</div>

<script>

  // NAVIGATION
  function showSection(id, el) {
      document.querySelectorAll(".section").forEach(s => s.style.display = "none");
      document.getElementById(id).style.display = "block";

      document.querySelectorAll(".sidebar p").forEach(p => p.classList.remove("active"));
      el.classList.add("active");

      if(id === "resumes") loadResumes();
      if(id === "analytics") loadAnalytics();
  }

  // UPLOAD
  function upload(){
      let file=document.getElementById("file").files[0];
      if(!file) return alert("Select file");

      let formData=new FormData();
      formData.append("file",file);

      fetch("/api/resume/upload",{method:"POST",body:formData})
      .then(()=>alert("Uploaded"))
  }

  // LOAD RESUMES
  function loadResumes(){
      fetch("/api/resume/all")
      .then(res=>res.json())
      .then(data=>{
          let output="";

          data.forEach(r=>{
              let color=r.score>70?"#16a34a":r.score>40?"#f59e0b":"#dc2626";

              let skills=r.skills.split(",").map(s=>`<span class="tag">${s}</span>`).join("");

              output+=`
              <div class="card">
                  <h4>${r.fileName}</h4>
                  <div>${skills}</div>

                  <p>Score: ${r.score}%</p>
                  <div class="progress">
                      <div class="progress-bar" style="width:${r.score}%;background:${color}"></div>
                  </div>

                  <button onclick="matchJob(${r.id})">Match</button>

                  <div id="match-${r.id}"></div>
              </div>
              `;
          });

          document.getElementById("output").innerHTML=output;
      });
  }

  // MATCH JOB
  function matchJob(id){
      let jobDesc=document.getElementById("jobDesc").value;
      if(!jobDesc) return alert("Enter job description");

      fetch("/api/resume/match/"+id,{
          method:"POST",
          headers:{"Content-Type":"text/plain"},
          body:jobDesc
      })
      .then(res=>res.text())
      .then(data=>{
          document.getElementById("match-"+id).innerHTML=`Match: ${data}%`;
      });
  }

  // ANALYTICS
  function loadAnalytics(){
      fetch("/api/resume/all")
      .then(res=>res.json())
      .then(data=>{
          let total=data.length;
          let avg=(data.reduce((a,b)=>a+b.score,0)/total || 0).toFixed(2);

          document.getElementById("total").innerText="Total Resumes: "+total;
          document.getElementById("avg").innerText="Average Score: "+avg+"%";
      });
  }

</script>

</body>
</html>
